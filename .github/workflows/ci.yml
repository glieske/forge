name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Build and deploy update artifacts to S3"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      s3_bucket:
        description: "Target S3 bucket name, without s3://"
        required: false
        type: string
      s3_prefix:
        description: "Bucket prefix. Use forge for URLs ending in /forge/updates"
        required: false
        default: "forge"
        type: string
      channel:
        description: "Release channel"
        required: false
        default: "stable"
        type: choice
        options:
          - stable
          - beta
          - dev
      version:
        description: "Version to publish, for example 0.2.0"
        required: false
        type: string
      aws_region:
        description: "AWS region"
        required: false
        default: "eu-central-1"
        type: string

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  GO_VERSION: "1.26.2"
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}

jobs:
  ci:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify module metadata
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: make fmt-check

      - name: Check shell scripts
        run: sh -n scripts/dev.sh scripts/build-all.sh scripts/package-release.sh scripts/cosign-sign-release.sh scripts/checksum-release.sh scripts/sign-s3-metadata.sh

      - name: Vet
        run: make lint

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: ./... --timeout=5m

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Cross-compile supported targets
        run: make build-all

      - name: Check examples
        run: make examples-check

      - name: Validate S3 example JSON
        run: jq empty $(find examples/s3-bucket -name '*.json' -print)

      - name: Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          scanners: vuln
          skip-dirs: .cache,bin,dist,.git,.opencode,.swarm

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy blocking scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          skip-dirs: .cache,bin,dist,.git,.opencode,.swarm

      - name: Upload forge binary
        uses: actions/upload-artifact@v7
        with:
          name: forge-linux-amd64
          path: bin/forge

  deploy-s3:
    name: Deploy S3 Update Repository
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'
    steps:
      - name: Validate inputs
        run: |
          test -n "${{ inputs.s3_bucket }}" || (echo "s3_bucket is required when deploy=true" && exit 2)
          test -n "${{ inputs.version }}" || (echo "version is required when deploy=true" && exit 2)

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Configure AWS credentials from OIDC role
        if: env.AWS_ROLE_TO_ASSUME != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ inputs.aws_region }}

      - name: Configure AWS credentials from secrets
        if: env.AWS_ROLE_TO_ASSUME == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Download existing update index
        run: |
          mkdir -p "dist/s3/forge/updates/${{ inputs.channel }}"
          aws s3 cp \
            "s3://${{ inputs.s3_bucket }}/${{ inputs.s3_prefix }}/updates/${{ inputs.channel }}/index.json" \
            "dist/s3/forge/updates/${{ inputs.channel }}/index.json" || true

      - name: Build update repository
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: make package-release

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign release artifacts with Cosign keyless OIDC
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: ./scripts/cosign-sign-release.sh

      - name: Calculate and sign final checksums
        env:
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
          FORGE_ED25519_PRIVATE_KEY: ${{ secrets.FORGE_ED25519_PRIVATE_KEY }}
          FORGE_ED25519_PUBLIC_KEY: ${{ secrets.FORGE_ED25519_PUBLIC_KEY }}
        run: ./scripts/checksum-release.sh

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          tag="v${VERSION}"
          version_dir="dist/s3/forge/updates/${CHANNEL}/${VERSION}"
          prerelease=""
          if [ "$CHANNEL" != "stable" ]; then
            prerelease="--prerelease"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$version_dir"/* --clobber
          else
            gh release create "$tag" "$version_dir"/* \
              --title "forge ${VERSION}" \
              --notes "forge ${VERSION} (${CHANNEL})" \
              --target "$GITHUB_SHA" \
              $prerelease
          fi

      - name: Upload release repository to S3
        run: |
          aws s3 cp "dist/s3/forge/updates/public-key.ed25519" \
            "s3://${{ inputs.s3_bucket }}/${{ inputs.s3_prefix }}/updates/public-key.ed25519"
          aws s3 sync "dist/s3/forge/updates/${{ inputs.channel }}" \
            "s3://${{ inputs.s3_bucket }}/${{ inputs.s3_prefix }}/updates/${{ inputs.channel }}"

      - name: Print published URL
        run: |
          echo "Published updates URL:"
          echo "https://${{ inputs.s3_bucket }}.s3.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.s3_prefix }}/updates"
